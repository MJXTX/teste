<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Seu Site</title>
    
    <!-- CSP Relaxado para GitHub Pages -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://www.googletagmanager.com https://*.google-analytics.com 'unsafe-inline' 'unsafe-eval';
        connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com;
        img-src 'self' data: https://*.google-analytics.com;
    ">
</head>
<body>
    <h1>Meu Site</h1>

    <!-- Implementação Ultra-Resiliente do GA4 -->
    <script>
        // 1. Inicialização segura do dataLayer
        window.dataLayer = window.dataLayer || [];
        
        // 2. Função gtag com fallback integrado
        function gtag(){
            try {
                dataLayer.push(arguments);
            } catch(e) {
                console.warn('Falha no dataLayer - Usando fallback direto');
                // Fallback direto para API de medição
                if(arguments[0] === 'event') {
                    const eventData = {
                        v: '2',
                        tid: 'G-6E8ZC9YNDQ',
                        en: arguments[1],
                        ...arguments[2]
                    };
                    navigator.sendBeacon('https://www.google-analytics.com/g/collect', 
                        new URLSearchParams(eventData).toString());
                }
            }
        }
        
        // 3. Configuração inicial
        gtag('js', new Date());
        gtag('config', 'G-6E8ZC9YNDQ', {
            transport_type: 'beacon',
            cookie_flags: 'SameSite=None;Secure'
        });
        
        // 4. Carregamento com múltiplos fallbacks
        function loadGA() {
            // Tentativa 1: Carregamento padrão
            const script = document.createElement('script');
            script.src = 'https://www.googletagmanager.com/gtag/js?id=G-6E8ZC9YNDQ';
            script.async = true;
            
            script.onerror = function() {
                // Tentativa 2: Carregamento alternativo
                console.warn('Falha no carregamento principal - Tentando CDN alternativo');
                const altScript = document.createElement('script');
                altScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-6E8ZC9YNDQ&l=dataLayer&cx=c';
                altScript.async = true;
                
                altScript.onerror = function() {
                    // Tentativa 3: Fallback completo
                    console.warn('Falha em todos os métodos - Ativando modo offline');
                    window['ga-disable-G-6E8ZC9YNDQ'] = false;
                    gtag('event', 'fallback_activated');
                };
                
                document.head.appendChild(altScript);
            };
            
            document.head.appendChild(script);
        }
        
        // 5. Verificação de ambiente
        if(document.location.hostname === 'localhost') {
            console.log('Ambiente local - GA4 simulado');
            window['ga-disable-G-6E8ZC9YNDQ'] = true;
        } else {
            // Delay para evitar bloqueio por scripts de terceiros
            setTimeout(loadGA, 500);
        }
    </script>
    
    <!-- Verificação de funcionamento -->
    <script>
        setTimeout(function() {
            if(typeof gtag === 'function' && window.dataLayer.some(item => item.event === 'gtm.js')) {
                console.log('✅ GA4 carregado com sucesso');
            } else {
                console.warn('⚠️ GA4 usando fallback');
                gtag('event', 'page_view', {
                    page_title: document.title,
                    page_location: location.href,
                    page_path: location.pathname
                });
            }
        }, 3000);
    </script>
</body>
</html>
