<!DOCTYPE html>
<html lang="pt"> <!-- Altere para 'en' se necessário -->
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecionando...</title>

  <script>
    // Função para detectar o país a partir da URL
    function getCountry() {
      const urlPath = window.location.pathname;
      if (urlPath.includes("/br")) return "br";
      if (urlPath.includes("/es")) return "es";
      if (urlPath.includes("/uk")) return "uk";
      if (urlPath.includes("/us")) return "us";
      return "br"; // Se não tiver país, o padrão será 'br'
    }

    // Detecta se o dispositivo é mobile ou desktop
    const userAgent = navigator.userAgent.toLowerCase();
    const isMobile = /iphone|ipod|android.*mobile|windows phone|blackberry/.test(userAgent);
    const isTablet = /ipad|android(?!.*mobile)/.test(userAgent);
    const deviceType = (isMobile || isTablet) ? "mobile" : "desktop";

    // Obtemos o país da URL
    const country = getCountry();

    // Redireciona para a página correta dentro do país e dispositivo
    const target = /${country}/${deviceType}/index.html;
    window.location.replace(target); // Redireciona o usuário
  </script>
</head>
<body>
  <!-- Corpo vazio, pois o redirecionamento acontece automaticamente -->
</body>
</html>
