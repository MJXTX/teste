<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Redirecionando...</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KZYWBQZPK1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-KZYWBQZPK1');
  </script>

  <!-- Script de Redirecionamento Atualizado -->
  <script>
    // 1. Países suportados
    const supportedCountries = ['br', 'es', 'uk', 'us'];
    
    // 2. Detecta dispositivo (mobile/tablet ou desktop)
    const userAgent = navigator.userAgent.toLowerCase();
    const isMobile = /iphone|ipod|android.*mobile|windows phone|blackberry/.test(userAgent);
    const isTablet = /ipad|android(?!.*mobile)/.test(userAgent);
    
    // 3. Pega o país da URL (ex: site.com/br → 'br')
    const urlParts = window.location.pathname.split('/').filter(Boolean);
    let country = urlParts[0] || 'br'; // Padrão: 'br' se não houver país
    
    // 4. Valida o país (se não existir, usa 'br')
    if (!supportedCountries.includes(country)) {
      country = 'br';
    }
    
    // 5. Define o destino SEM BARRA INICIAL (ex: 'br/mobile/index.html')
    const devicePath = (isMobile || isTablet) ? 'mobile' : 'desktop';
    const targetUrl = ${country}/${devicePath}/index.html; // 👈 Sem "/" no início
    
    // 6. Redireciona após 300ms (tempo para o GA registrar)
    setTimeout(() => {
      window.location.replace(targetUrl);
    }, 300);
  </script>
</head>
<body>
  <p>Redirecionando...</p>
</body>
</html>
