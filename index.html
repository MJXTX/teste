<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Redirecionando...</title>

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KZYWBQZPK1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-KZYWBQZPK1');
  </script>

  <!-- Script de Redirecionamento para Mobile/Desktop -->
  <script>
    // Detectando o dispositivo (mobile ou tablet)
    const userAgent = navigator.userAgent.toLowerCase();
    const isMobile = /iphone|ipod|android.*mobile|windows phone|blackberry/.test(userAgent);
    const isTablet = /ipad|android(?!.*mobile)/.test(userAgent);

    // Obtendo o diretório de país da URL (ex: '/br', '/es', '/uk', etc.)
    const country = window.location.pathname.split('/')[1]; // Exemplo: 'br', 'es', 'uk'

    // Define o caminho de destino com base no dispositivo (mobile ou desktop)
    const target = (isMobile || isTablet) ? /${country}/mobile/index.html : /${country}/desktop/index.html;

    // Espera 300ms para o Google Analytics registrar antes de redirecionar
    setTimeout(() => {
      window.location.replace(target);
    }, 300);
  </script>
</head>
<body>
  <p>Redirecionando...</p>
</body>
</html>
