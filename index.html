<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Redirecionando...</title>

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KZYWBQZPK1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-KZYWBQZPK1');
  </script>

  <script>
    function getQueryParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    const country = getQueryParam("pais") || "br"; // padrão: br
    const userAgent = navigator.userAgent.toLowerCase();
    const isMobile = /iphone|ipod|android.*mobile|windows phone|blackberry/.test(userAgent);
    const isTablet = /ipad|android(?!.*mobile)/.test(userAgent);
    const target = (isMobile || isTablet)
      ? /${country}/mobile/index.html
      : /${country}/desktop/index.html;

    setTimeout(() => {
      window.location.replace(target);
    }, 300);
  </script>
</head>
<body>
  <p>Redirecionando...</p>
</body>
</html>
