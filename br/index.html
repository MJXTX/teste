<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>PAISLEY LOVERS BR © Official Site | Luminis </title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XT86ZNLK1N"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-XT86ZNLK1N');
  </script>

  <!-- CSS será carregado dinamicamente -->
  <link id="css-link" rel="stylesheet">

  <!-- Pode adicionar pré-carregamento de recursos, caso tenha imagens críticas -->
  <link rel="preload" href="mobile/sobreposta1.webp" as="image">
  <link rel="preload" href="mobile/sobreposta2.webp" as="image">
  <link rel="preload" href="desktop/sobreposta1.webp" as="image">
</head>
<body>
  <!-- Carregar o conteúdo direto aqui (substitua o conteúdo do 'app') -->
  <div id="app">
    <!-- Este conteúdo será trocado dinamicamente com base no dispositivo -->
    <h1>Bem-vindo ao Paisley Lovers!</h1>
    <p>A página irá carregar as imagens corretamente com base no seu dispositivo.</p>
  </div>

  <script>
    // Verifica se é um dispositivo móvel
    const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
    const pasta = isMobile ? 'mobile' : 'desktop';
    window.basePath = pasta;

    // Aplica o CSS correto
    document.getElementById('css-link').href = `${pasta}/style.css`;

    // Carrega o script correto com base no dispositivo
    const script = document.createElement('script');
    script.src = `${pasta}/script.js`;
    document.body.appendChild(script);
  </script>
</body>
</html>
