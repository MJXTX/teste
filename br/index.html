<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Meu Site - Redirecionando</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Analytics (GA4) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XT86ZNLK1N"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }

    gtag('js', new Date());
    gtag('config', 'G-XT86ZNLK1N');
  </script>

  <!-- Estilo padrão -->
  <link id="dynamic-style" rel="stylesheet" href="">
</head>
<body>
  <div id="app">Carregando conteúdo...</div>

  <script>
    const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
    const pasta = isMobile ? 'mobile' : 'desktop';  // Determina qual pasta carregar

    // Envia evento para o GA
    gtag('event', 'auto_redirect', {
      'device_type': pasta
    });

    // Carrega o CSS da pasta correta
    const cssPath = `${pasta}/style.css`;
    fetch(cssPath).then(r => {
      if (r.ok) {
        document.getElementById('dynamic-style').href = cssPath;
      }
    });

    // Carrega conteúdo HTML
    fetch(`${pasta}/index.html`)
      .then(res => res.text())
      .then(html => {
        document.getElementById('app').innerHTML = html;

        // Carregar JS associado ao conteúdo carregado
        const script = document.createElement('script');
        script.src = `${pasta}/script.js`;
        document.body.appendChild(script);

        // Atualizar as URLs das imagens
        updateImagePaths();
      })
      .catch(() => {
        document.getElementById('app').innerHTML = "Erro ao carregar o conteúdo.";
      });

    // Ajuste nas URLs das imagens
    function updateImagePaths() {
      const images = document.querySelectorAll('img');
      images.forEach(img => {
        const originalSrc = img.getAttribute('src');
        const newSrc = `/${pasta}/${originalSrc}`;
        img.setAttribute('src', newSrc);
      });
    }

    // Verifica se as imagens estão carregando corretamente após o conteúdo ser carregado
    document.addEventListener('DOMContentLoaded', () => {
      updateImagePaths();
    });
  </script>
</body>
</html>
