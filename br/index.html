<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Meu Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XT86ZNLK1N"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-XT86ZNLK1N');
  </script>

  <!-- O link do CSS será inserido via script -->
  <link id="css-link" rel="stylesheet">
</head>
<body>
  <div id="app">Carregando...</div>

  <script>
    const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
    const pasta = isMobile ? 'mobile' : 'desktop';

    gtag('event', 'auto_redirect', {
      'device_type': pasta
    });

    // Aplica CSS correto
    document.getElementById('css-link').href = `${pasta}/style.css`;

    // Carrega o HTML da pasta
    fetch(`${pasta}/index.html`)
      .then(res => res.text())
      .then(html => {
        // Corrige os caminhos relativos de imagens, links e scripts
        const corrigido = html.replace(/(src|href)=["'](?!https?:|\/)([^"']+)["']/g, (match, tipo, caminho) => {
          return `${tipo}="${pasta}/${caminho}"`;
        });

        // Insere o conteúdo corrigido
        document.getElementById('app').innerHTML = corrigido;

        // Carrega script.js externo, se necessário
        const script = document.createElement('script');
        script.src = `${pasta}/script.js`;
        document.body.appendChild(script);
      })
      .catch(err => {
        console.error('Erro ao carregar:', err);
        document.getElementById('app').innerText = 'Erro ao carregar conteúdo.';
      });
  </script>
</body>
</html>
