<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com;">
  <title>Redirecionando...</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6E8ZC9YNDQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-6E8ZC9YNDQ');

    // Detecta o país e dispositivo
    const path = window.location.pathname;
    
    // Verifica a URL e captura o país
    const match = path.match(/^\/(br|es|uk|us)\/?/i);  // Expressão regular corrigida
    const country = match ? match[1].toLowerCase() : 'br'; // Usa 'br' por padrão se não encontrar

    const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

    // Envia evento para o Google Analytics
    gtag('event', 'auto_redirect', {
      'country': country,
      'device_type': isMobile ? 'mobile' : 'desktop'
    });

    // Redirecionamento para a página apropriada
    window.location.replace(/${country}/${isMobile ? 'mobile' : 'desktop'}/index.html);
  </script>
</head>
<body>
  <!-- Página de redirecionamento -->
</body>
</html>
