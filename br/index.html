<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Redirecionando...</title>

  <!-- Google Analytics (GA4) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XT86ZNLK1N"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }

    gtag('js', new Date());
    gtag('config', 'G-XT86ZNLK1N');

    window.addEventListener('load', async () => {
      const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
      const deviceFolder = isMobile ? 'mobile' : 'desktop';
      const destino = `${deviceFolder}/index.html`;

      // GA event
      gtag('event', 'auto_redirect', {
        'device_type': isMobile ? 'mobile' : 'desktop'
      });

      // Aguarda 200ms para o GA registrar
      await new Promise(resolve => setTimeout(resolve, 200));

      try {
        const response = await fetch(destino);
        const html = await response.text();
        document.open();
        document.write(html);
        document.close();

        // Mantém URL limpa
        history.replaceState(null, '', window.location.pathname.replace(/\/(mobile|desktop)\/index\.html$/, '/'));
      } catch (e) {
        console.error('Erro ao carregar conteúdo:', e);
        document.body.innerHTML = '<h1>Erro ao carregar a página</h1>';
      }
    });
  </script>
</head>

</html>
