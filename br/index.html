<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>PAISLEY LOVERS BR © Official Site | Luminis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link id="css-link" rel="stylesheet">
  <script>
    const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
    const pasta = isMobile ? 'mobile' : 'desktop';
    window.basePath = pasta;
    document.documentElement.classList.add(pasta); // Para facilitar seletores no CSS
  </script>
</head>
<body>
  <!-- Conteúdo COMUM das duas versões -->

  <!-- Conteúdo específico de cada versão -->
  <div class="mobile-only" style="display:none">
    <!-- conteúdo da versão mobile aqui -->
    <img id="imagemSobreposta" src="mobile/sobreposta1.webp" alt="">
  </div>

  <div class="desktop-only" style="display:none">
    <!-- conteúdo da versão desktop aqui -->
    <img id="imagemSobreposta" src="desktop/sobreposta1.webp" alt="">
  </div>

  <script>
    // Aplica o CSS correto
    document.getElementById('css-link').href = `${window.basePath}/style.css`;

    // Mostra a versão certa
    document.querySelector(`.${window.basePath}-only`).style.display = 'block';

    // Carrega JS correto
    const script = document.createElement('script');
    script.src = `${window.basePath}/script.js`;
    document.body.appendChild(script);
  </script>
</body>
</html>
