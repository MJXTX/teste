<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Redirecionando...</title>

  <!-- Google Analytics (GA4) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XT86ZNLK1N"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }

    gtag('js', new Date());
    gtag('config', 'G-XT86ZNLK1N');

    window.addEventListener('load', () => {
      const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
      const destino = isMobile ? 'mobile/index.html' : 'desktop/index.html';

      // Envia evento para GA antes do redirecionamento
      gtag('event', 'auto_redirect', {
        'device_type': isMobile ? 'mobile' : 'desktop'
      });

      // Aguarda 300ms para garantir o envio do evento
      setTimeout(() => {
        window.location.replace(destino);
      }, 300);
    });
  </script>
</head>
</html>
